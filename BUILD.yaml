targets:
  - name: lint_python
    command: .venv/bin/ruff check --fix lib/python/ examples/ tests/
    inputs:
      - "lib/python/**/*.py"
      - "examples/**/*.py"
      - "tests/**/*.py"
      - pyproject.toml
    dependencies:
      - :python_install

  - name: lint_format
    command: .venv/bin/ruff format --check lib/python/ examples/ tests/
    inputs:
      - "lib/python/**/*.py"
      - "examples/**/*.py"
      - "tests/**/*.py"
      - pyproject.toml
    dependencies:
      - :python_install

  - name: typecheck
    command: .venv/bin/zuban check
    inputs:
      - "lib/python/**/*.py"
      - "examples/**/*.py"
      - pyproject.toml
    dependencies:
      - :python_install

  - name: lint_docker
    command: hadolint Dockerfile lib/python/genesis/webui/frontend/Dockerfile
    inputs:
      - Dockerfile
      - lib/python/genesis/webui/frontend/Dockerfile

  - name: python_install
    command: "true"
    inputs:
      - pyproject.toml

  - name: python_test
    command: .venv/bin/pytest tests/ -x -q
    inputs:
      - "tests/**/*.py"
      - "lib/python/genesis/**/*.py"
      - pyproject.toml
    dependencies:
      - :python_install
      - :lint_python
      - :lint_format

  - name: docs_build
    command: .venv/bin/mkdocs build --strict
    inputs:
      - "docs/**/*.md"
      - mkdocs.yml
      - "lib/python/genesis/**/*.py"
    outputs:
      - "dir::site"
    dependencies:
      - :python_install
