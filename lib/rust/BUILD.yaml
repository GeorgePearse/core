targets:
  - name: fmt_check
    command: cargo fmt --check
    inputs:
      - "src/**/*.rs"
      - Cargo.toml

  - name: clippy
    command: cargo clippy -- -D warnings
    inputs:
      - "src/**/*.rs"
      - Cargo.toml
      - Cargo.lock

  - name: build
    command: cargo build --release
    inputs:
      - "src/**/*.rs"
      - Cargo.toml
      - Cargo.lock
    outputs:
      - target/release/genesis_rust_backend
    dependencies:
      - :fmt_check
      - :clippy

  - name: test_unit
    command: cargo test --lib
    inputs:
      - "src/**/*.rs"
      - Cargo.toml
    dependencies:
      - :clippy

  - name: test_integration
    command: cargo test --test db_integration --test memory_tests
    inputs:
      - "src/**/*.rs"
      - "tests/**/*.rs"
      - Cargo.toml
    dependencies:
      - :clippy
    tags:
      - integration
