name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  grog-build:
    name: Build & Test (grog)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: genesis
          POSTGRES_USER: genesis_app
          POSTGRES_PASSWORD: genesis_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install grog
        run: |
          curl -L https://grog.build/latest/grog-linux-amd64 -o /usr/local/bin/grog
          chmod +x /usr/local/bin/grog

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lib/rust

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv venv --python 3.12

      - name: Install Python dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Install hadolint
        run: |
          wget -q https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 -O /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Install Liquibase
        run: |
          wget -q https://github.com/liquibase/liquibase/releases/download/v4.29.2/liquibase-4.29.2.tar.gz
          mkdir -p /opt/liquibase
          tar xzf liquibase-4.29.2.tar.gz -C /opt/liquibase
          echo "/opt/liquibase" >> $GITHUB_PATH

      - name: grog build-and-test
        run: |
          source .venv/bin/activate
          grog build-and-test //...
        env:
          POSTGRES_PASSWORD: genesis_dev

      - name: Verify full_ddl.sql is in sync
        run: |
          normalize() {
            sed '/^-- Dumped from database version/d; /^-- Dumped by pg_dump version/d; /^\\restrict/d; /^\\unrestrict/d; /^SELECT pg_catalog/d; /^SET default_table_access_method/d' "$1"
          }
          PGPASSWORD=genesis_dev pg_dump \
            -h localhost -p 5432 -U genesis_app -d genesis \
            --schema-only --no-owner --no-privileges \
            --exclude-table='databasechangelog*' \
            > /tmp/full_ddl_generated.sql
          normalize migrations/full_ddl.sql > /tmp/full_ddl_repo.sql
          normalize /tmp/full_ddl_generated.sql > /tmp/full_ddl_ci.sql
          diff -u /tmp/full_ddl_repo.sql /tmp/full_ddl_ci.sql || \
            (echo "ERROR: migrations/full_ddl.sql is out of sync." && exit 1)
