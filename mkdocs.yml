site_name: Genesis
site_description: LLM-Driven Program Evolution Platform
site_url: https://georgepearse.github.io/core/
repo_url: https://github.com/GeorgePearse/core
repo_name: GeorgePearse/core

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [lib/python]
          options:
            show_root_heading: true
            show_source: true
            allow_inspection: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation & Quick Start: getting_started.md
      - Creating Tasks: creating_tasks.md
      - Configuration: configuration.md
  - Guides:
      - Available LLMs: available_llms.md
      - Local LLM Support: support_local_llm.md
      - E2B Integration: e2b_integration.md
      - Logging & Analytics: logging.md
      - ClickHouse Integration: clickhouse.md
      - WebUI: webui.md
      - MCP Integration: mcp_integration.md
  - Architecture:
      - Evolutionary Approach: evolutionary_approach.md
      - Modular Architecture: modular_architecture.md
      - SAGA Integration: saga_integration.md
      - Schedule Plan: schedule-plan.md
  - Development:
      - Developer Guide: developer_guide.md
      - Dev Environment: devenv.md
      - Roadmap: roadmap.md
  - Research:
      - Recent Papers: papers.md
      - DSPy Integration Ideas: dspy_integration.md
      - OpenR Integration: openr_integration.md
  - API Reference:
      - Core:
          - Runner: api/core/runner.md
          - Evolution Config: api/core/config.md
      - Database: api/database.md
      - Launch: api/launch.md
      - ClickHouse Schema: clickhouse_schema_reference.md
